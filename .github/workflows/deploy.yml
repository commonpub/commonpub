name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t commonpub-app:latest .

      - name: Save image tarball
        run: docker save commonpub-app:latest | gzip > commonpub-app.tar.gz

      - name: Copy image to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          source: commonpub-app.tar.gz
          target: /opt/commonpub/
          timeout: 300s

      - name: Load image and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /opt/commonpub
            docker load < commonpub-app.tar.gz
            rm -f commonpub-app.tar.gz
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            sleep 5
            # Apply schema changes via drizzle-kit push
            # --force handles most cases; if it fails due to TTY prompts (e.g. unique
            # constraint on table with data), log a warning — the deploy still succeeds
            # and additive changes (new columns/tables) are applied.
            docker compose -f docker-compose.prod.yml exec -T app npx drizzle-kit push --force 2>&1 \
              && echo "db:push succeeded" \
              || echo "::warning::db:push needs manual review — run interactively on the droplet if schema changes were not applied"
            docker image prune -f
            echo "Deployed ${{ github.sha }}"
