name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t commonpub-app:latest .

      - name: Save image tarball
        run: docker save commonpub-app:latest | gzip > commonpub-app.tar.gz

      - name: Copy image to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          source: commonpub-app.tar.gz
          target: /opt/commonpub/
          timeout: 300s

      - name: Load image and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /opt/commonpub
            docker load < commonpub-app.tar.gz
            rm -f commonpub-app.tar.gz
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            sleep 5
            # Apply schema changes via drizzle-kit migrate (reads committed .sql files,
            # never prompts in CI — unlike `push`, which blocks on TTY prompts for
            # populated-table constraint changes and silently drops downstream DDL).
            # Migration files live under packages/schema/migrations/ and ship in the
            # image at /app/schema/migrations/. The `drizzle` schema table tracks
            # which migrations have been applied.
            docker compose -f docker-compose.prod.yml exec -T app node scripts/db-migrate.mjs --config=drizzle.config.js 2>&1 | tee /tmp/dbmigrate.log \
              || { echo "::error::db:migrate failed — see log above"; cat /tmp/dbmigrate.log; exit 1; }
            docker image prune -f
            # Post-deploy smoke test — verify app is responding
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ Health check passed"
                break
              fi
              echo "⏳ Waiting for app to start... ($i/5)"
              sleep 5
            done
            curl -sf http://localhost:3000/api/health || echo "::warning::Health check failed — app may not have started correctly"
            echo "Deployed ${{ github.sha }}"
