name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t commonpub-app:latest .

      - name: Save image tarball
        run: docker save commonpub-app:latest | gzip > commonpub-app.tar.gz

      - name: Copy image to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          source: commonpub-app.tar.gz
          target: /opt/commonpub/
          timeout: 300s

      - name: Load image and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /opt/commonpub
            docker load < commonpub-app.tar.gz
            rm -f commonpub-app.tar.gz
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            sleep 5
            # Apply schema changes via drizzle-kit push
            # Use --force to auto-accept additive changes. If it fails (e.g. interactive
            # prompts for renames), the deploy still succeeds but logs a warning.
            docker compose -f docker-compose.prod.yml exec -T app npx drizzle-kit push --config=drizzle.config.js --force 2>&1 | tee /tmp/dbpush.log \
              && echo "✅ db:push succeeded" \
              || { echo "::warning::db:push failed — schema changes may need manual SQL. Check output above."; cat /tmp/dbpush.log; }
            docker image prune -f
            # Post-deploy smoke test — verify app is responding
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ Health check passed"
                break
              fi
              echo "⏳ Waiting for app to start... ($i/5)"
              sleep 5
            done
            curl -sf http://localhost:3000/api/health || echo "::warning::Health check failed — app may not have started correctly"
            echo "Deployed ${{ github.sha }}"
