name: Deploy Production

on:
  push:
    branches: [main]
    # Docs-only commits don't change the built image — skip the full rebuild+deploy.
    # (A commit that also touches code/config still deploys; paths-ignore only skips
    # when EVERY changed file matches.)
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      # Pipeline gate — a red typecheck/lint must NOT reach production. The `check`
      # job (ci.yml) runs the full suite, but it's a SEPARATE workflow, so GitHub
      # `needs:` can't couple this deploy to it. Instead we re-run the two red-capable
      # static checks inline here as a hard gate before any image build. This is the
      # class of bug that shipped session 242 (a layer type error the Dockerfile's
      # `pnpm build` does NOT typecheck). Tests still run in the parallel `check` job.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (deploy gate)
        run: pnpm typecheck

      - name: Lint (deploy gate)
        run: pnpm lint

      - name: Build Docker image
        run: docker build -t commonpub-app:latest .

      - name: Save image tarball
        run: docker save commonpub-app:latest | gzip > commonpub-app.tar.gz

      - name: Copy image to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          source: commonpub-app.tar.gz
          target: /opt/commonpub/
          timeout: 300s

      - name: Load image and restart
        uses: appleboy/ssh-action@v1
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_PUBLIC_URL: ${{ secrets.S3_PUBLIC_URL }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 5m
          envs: S3_BUCKET,S3_REGION,S3_ENDPOINT,S3_ACCESS_KEY,S3_SECRET_KEY,S3_PUBLIC_URL
          script: |
            set -e
            # pipefail so a failing `db-migrate.mjs | tee` is NOT masked by tee's exit 0
            # (otherwise a broken migration sails through to smoke — audit session 204).
            set -o pipefail
            cd /opt/commonpub
            # Sync object-storage (DO Spaces) config into .env from CI secrets,
            # idempotently. Values come from masked GitHub secrets, so they are
            # not exposed in the Actions log. Without these the app falls back to
            # the local-filesystem adapter, which in prod is neither writable
            # (root-owned volume, non-root container) nor served back, so every
            # upload fails. Only rewrites the S3_* lines, leaving other .env vars
            # (DB, redis, etc.) untouched.
            if [ -n "$S3_BUCKET" ]; then
              touch .env
              sed -i '/^S3_/d' .env
              {
                echo "S3_BUCKET=$S3_BUCKET"
                echo "S3_REGION=$S3_REGION"
                echo "S3_ENDPOINT=$S3_ENDPOINT"
                echo "S3_ACCESS_KEY=$S3_ACCESS_KEY"
                echo "S3_SECRET_KEY=$S3_SECRET_KEY"
                echo "S3_PUBLIC_URL=$S3_PUBLIC_URL"
              } >> .env
            fi
            docker load < commonpub-app.tar.gz
            rm -f commonpub-app.tar.gz
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            sleep 5
            # Apply schema changes via drizzle-kit migrate (reads committed .sql files,
            # never prompts in CI — unlike `push`, which blocks on TTY prompts for
            # populated-table constraint changes and silently drops downstream DDL).
            # Migration files live under packages/schema/migrations/ and ship in the
            # image at /app/schema/migrations/. The `drizzle` schema table tracks
            # which migrations have been applied.
            docker compose -f docker-compose.prod.yml exec -T app node scripts/db-migrate.mjs 2>&1 | tee /tmp/dbmigrate.log \
              || { echo "::error::db:migrate failed — see log above"; cat /tmp/dbmigrate.log; exit 1; }
            docker image prune -f
            # Post-deploy smoke — runs INSIDE the app container. The app listens
            # on localhost:3000 *inside* the container (see the Dockerfile
            # HEALTHCHECK); that port is NOT published to the droplet host (caddy
            # fronts 80/443), so a host-level `curl localhost:3000` never reaches
            # the app — which is why the old `curl … || ::warning` check silently
            # never worked. scripts/smoke.mjs waits for /api/health, then verifies
            # CRITICAL ROUTES incl. `/`, and exits non-zero if any serves non-2xx.
            # This is what would have caught session 169's homepage 500 ("DnD
            # provider not found") that the health-only, warn-only smoke shipped
            # as a green success.
            docker compose -f docker-compose.prod.yml exec -T app node scripts/smoke.mjs \
              || { echo "::error::Post-deploy smoke failed — new image is live but serving errors. Investigate / consider redeploying the previous SHA."; exit 1; }
            echo "Deployed ${{ github.sha }}"
