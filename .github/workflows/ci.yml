name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: commonpub
          POSTGRES_PASSWORD: commonpub_test
          POSTGRES_DB: commonpub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U commonpub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Redis sidecar for the opt-in integration test in
      # packages/infra/src/__tests__/redis.integration.test.ts. The test
      # file is gated on REDIS_URL_TEST; without this service the tests
      # skip cleanly. With it, they cover cross-instance rate-limit
      # enforcement + pub/sub delivery on every PR.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Dependency Audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Tests require Postgres (PGlite for unit, real PG for integration).
      # REDIS_URL_TEST opts the redis.integration.test.ts suite in against
      # the sidecar above.
      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://commonpub:commonpub_test@localhost:5432/commonpub_test
          REDIS_URL_TEST: redis://localhost:6379

      - name: Build
        run: pnpm build

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/create-commonpub
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy -- -D warnings -A dead_code

      - name: Test
        run: cargo test

  e2e:
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: commonpub
          POSTGRES_PASSWORD: commonpub_ci
          POSTGRES_DB: commonpub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U commonpub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://commonpub:commonpub_ci@localhost:5432/commonpub
      NUXT_DATABASE_URL: postgresql://commonpub:commonpub_ci@localhost:5432/commonpub
      # e2e covers smoke tests across feature-gated pages (/contests,
      # /learn, /videos, /events, /explainer). With the defaults OFF, the
      # feature-gate middleware 404s mid-navigation, which surfaces as a
      # "no fatal console errors" flake. Enable everything non-federation
      # so pages render their real content. Federation stays off — it
      # needs a second instance to be meaningful.
      FEATURE_ADMIN: 'true'
      FEATURE_CONTESTS: 'true'
      FEATURE_EVENTS: 'true'
      FEATURE_EXPLAINERS: 'true'
      FEATURE_LEARNING: 'true'
      FEATURE_VIDEO: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Apply database schema
        run: pnpm --filter @commonpub/schema exec drizzle-kit push --force

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E Tests
        run: pnpm exec playwright test --project=chromium
        env:
          AUTH_SECRET: test-secret-for-ci-min-32-chars-long

      # Upload the Playwright HTML report + test-results/ (traces, screenshots)
      # on e2e failure so the artifact can be downloaded and replayed locally
      # via `pnpm exec playwright show-trace trace.zip`. Without this step the
      # trace files are captured inside the runner and then discarded with it,
      # which is why repeat attempts at debugging the hero-banner dismiss
      # flake (session 131 + 132) had nothing to work from.
      - name: Upload Playwright trace + report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
