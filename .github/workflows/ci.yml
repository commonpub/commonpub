name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 23]

    # Postgres service only available on Linux runners
    services:
      postgres:
        image: ${{ matrix.os == 'ubuntu-latest' && 'postgres:16-alpine' || '' }}
        env:
          POSTGRES_USER: commonpub
          POSTGRES_PASSWORD: commonpub_test
          POSTGRES_DB: commonpub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Dependency Audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Tests require Postgres (PGlite for unit, real PG for integration)
      # Run on all platforms — PGlite-based tests work everywhere
      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: ${{ matrix.os == 'ubuntu-latest' && 'postgresql://commonpub:commonpub_test@localhost:5432/commonpub_test' || '' }}

      - name: Build
        run: pnpm build

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/create-commonpub
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  e2e:
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: commonpub
          POSTGRES_PASSWORD: commonpub_test
          POSTGRES_DB: commonpub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E Tests
        run: pnpm exec playwright test --project=chromium
        env:
          DATABASE_URL: postgresql://commonpub:commonpub_test@localhost:5432/commonpub_test
