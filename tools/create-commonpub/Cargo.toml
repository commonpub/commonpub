[package]
name = "create-commonpub"
version = "0.5.26"
edition = "2021"
description = "CLI tool for scaffolding new CommonPub instances"
license = "MIT"
repository = "https://github.com/commonpub/commonpub"
homepage = "https://commonpub.dev"
readme = "README.md"
keywords = ["commonpub", "activitypub", "federation", "scaffold", "nuxt"]
categories = ["command-line-utilities", "web-programming"]

include = ["src/**/*", "tests/**/*", "Cargo.toml", "README.md"]

[lib]
name = "create_commonpub"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
dialoguer = { version = "0.11", features = ["fuzzy-select"] }
console = "0.15"
indicatif = "0.17"
toml = "0.8"
# Cryptographically-secure random bytes for auto-generated secrets
# (`NUXT_AUTH_SECRET`, `CPUB_FED_TOKEN_KEY`) in `render_env`. OS RNG
# only — never the thread RNG. default-features = false drops the
# alloc-heavy distributions; `OsRng::fill_bytes` is all we need.
rand = { version = "0.8", default-features = false, features = ["std", "getrandom"] }

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"
