<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommonPub — Generic View Reference</title>
<style>
:root {
  --bg:#0c0c0b;--surface:#141413;--surface2:#1c1c1a;--surface3:#222220;
  --border:#272725;--border2:#333330;--text:#d8d5cf;--text-dim:#888884;
  --text-faint:#444440;--accent:#5b9cf6;--accent-bg:rgba(91,156,246,.10);
  --accent-border:rgba(91,156,246,.22);--green:#4ade80;--green-bg:rgba(74,222,128,.08);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,.08);--red:#f87171;
  --red-bg:rgba(248,113,113,.08);--radius:4px;--radius-lg:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;display:flex;flex-direction:column;overflow:hidden;}
/* SHELL */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:40px;display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0;}
.topbar-brand{font-size:12px;font-weight:700;color:var(--text-dim);letter-spacing:.06em;font-family:monospace;}
.topbar-brand span{color:var(--accent);}
.topbar-label{font-size:10px;color:var(--text-faint);letter-spacing:.1em;text-transform:uppercase;font-family:monospace;}
.shell{display:flex;flex:1;overflow:hidden;}
.sidenav{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.sidenav::-webkit-scrollbar{width:4px;}.sidenav::-webkit-scrollbar-thumb{background:var(--border2);}
.sidenav-group{padding:20px 0 4px;}
.sidenav-group-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);padding:0 16px 6px;font-family:monospace;}
.sidenav-item{display:flex;align-items:center;gap:10px;padding:7px 16px;font-size:12px;color:var(--text-dim);cursor:pointer;border:none;background:none;text-align:left;width:100%;border-left:2px solid transparent;}
.sidenav-item:hover{color:var(--text);background:var(--surface2);}
.sidenav-item.active{color:var(--text);background:var(--surface2);border-left-color:var(--accent);}
.sidenav-item .dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.sidenav-item.active .dot{background:var(--accent);}
.sidenav-item .badge{margin-left:auto;font-size:9px;font-family:monospace;background:var(--surface3);color:var(--text-faint);padding:1px 5px;border-radius:2px;}
.viewport{flex:1;overflow:hidden;position:relative;}
.view{display:none;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;}
.view.active{display:block;}
/* PRIMITIVES */
.tag{display:inline-flex;align-items:center;font-size:10px;font-family:monospace;padding:2px 8px;border-radius:2px;border:1px solid var(--border2);color:var(--text-dim);background:var(--surface2);}
.tag-accent{border-color:var(--accent-border);color:var(--accent);background:var(--accent-bg);}
.tag-green{border-color:rgba(74,222,128,.2);color:var(--green);background:var(--green-bg);}
.tag-yellow{border-color:rgba(251,191,36,.2);color:var(--yellow);background:var(--yellow-bg);}
.tag-red{border-color:rgba(248,113,113,.2);color:var(--red);background:var(--red-bg);}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;}
.av{width:28px;height:28px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text-dim);flex-shrink:0;font-family:monospace;}
.av-sm{width:20px;height:20px;font-size:8px;}
.av-lg{width:48px;height:48px;font-size:14px;}
.av-xl{width:72px;height:72px;font-size:18px;border-width:2px;}
.btn{font-family:system-ui;font-size:12px;padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-sm{padding:4px 10px;font-size:11px;}
.app-nav{background:var(--surface);border-bottom:1px solid var(--border);height:48px;display:flex;align-items:center;padding:0 32px;gap:24px;position:sticky;top:0;z-index:10;}
.app-nav-logo{font-size:14px;font-weight:700;color:var(--text);font-family:monospace;letter-spacing:-.01em;}
.app-nav-logo small{color:var(--text-dim);font-weight:400;font-size:11px;margin-left:4px;}
.nav-link{font-size:12px;color:var(--text-dim);padding:4px 10px;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;background:none;}
.nav-link.active{color:var(--text);background:var(--surface2);border-color:var(--border);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.page{max-width:1080px;margin:0 auto;padding:32px;}
.page-wide{max-width:1280px;margin:0 auto;padding:32px;}
.page-narrow{max-width:720px;margin:0 auto;padding:32px;}
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.sec-head h2{font-size:14px;font-weight:600;}
.sec-sub{font-size:11px;color:var(--text-dim);margin-left:auto;font-family:monospace;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.grid-sb{display:grid;grid-template-columns:1fr 280px;gap:32px;align-items:start;}
.grid-sb-wide{display:grid;grid-template-columns:1fr 320px;gap:32px;align-items:start;}
.grid-toc{display:grid;grid-template-columns:200px 1fr;gap:40px;align-items:start;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.card-body{padding:14px;}
.thumb{background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:11px;font-family:monospace;position:relative;overflow:hidden;}
.thumb::after{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:24px 24px;opacity:.4;}
.thumb-label{position:relative;z-index:1;}
.thumb-16x9{aspect-ratio:16/9;}
.thumb-21x9{aspect-ratio:21/9;}
.card-title{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.35;}
.card-meta{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:8px;font-family:monospace;}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.sb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.sb-title{font-size:11px;font-weight:700;color:var(--text-dim);font-family:monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.fed-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-family:monospace;color:var(--text-faint);padding:2px 8px;border-radius:2px;border:1px solid var(--border);background:var(--surface2);}
.fed-dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.step-block{display:flex;gap:16px;padding:20px 0;border-bottom:1px solid var(--border);}
.step-block:last-child{border-bottom:none;}
.step-num{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:monospace;font-weight:700;color:var(--text-dim);flex-shrink:0;}
.step-content{flex:1;}
.step-title{font-size:13px;font-weight:600;margin-bottom:6px;}
.step-body{font-size:12px;color:var(--text-dim);line-height:1.65;}
.step-img{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);height:110px;margin-top:10px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:monospace;color:var(--text-faint);}
.code-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:12px 0;}
.code-hdr{background:var(--surface3);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:8px;}
.code-lang{font-size:10px;font-family:monospace;color:var(--text-faint);}
.code-body{padding:14px 16px;font-size:12px;font-family:monospace;line-height:1.65;color:var(--text-dim);overflow-x:auto;}
.kw{color:var(--accent);}.str{color:var(--green);}.cmt{color:var(--text-faint);}.fn{color:var(--yellow);}
.callout{border-radius:var(--radius);padding:12px 14px;font-size:12px;line-height:1.6;display:flex;gap:10px;align-items:flex-start;}
.callout-note{background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--text-dim);}
.callout-warn{background:var(--yellow-bg);border:1px solid rgba(251,191,36,.2);color:var(--text-dim);}
.callout-icon{font-size:13px;line-height:1;flex-shrink:0;margin-top:1px;font-family:monospace;color:var(--text-faint);}
.bom-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
.bom-row:last-child{border-bottom:none;}
.bom-qty{min-width:28px;font-family:monospace;color:var(--accent);font-weight:700;}
.bom-name{flex:1;color:var(--text);}
.bom-link{font-size:10px;color:var(--text-faint);font-family:monospace;}
.toc-item{font-size:12px;color:var(--text-dim);padding:5px 0;border-left:2px solid var(--border);padding-left:12px;cursor:pointer;display:block;}
.toc-item.active{border-left-color:var(--accent);color:var(--text);}
.prose{font-size:14px;line-height:1.8;color:#b0ada8;}
.prose h2{font-size:18px;font-weight:700;color:var(--text);margin:28px 0 10px;}
.prose h3{font-size:14px;font-weight:600;color:var(--text);margin:20px 0 8px;}
.prose p{margin-bottom:14px;}
.prose blockquote{border-left:3px solid var(--accent);padding-left:16px;color:var(--text-dim);font-style:italic;margin:18px 0;}
.feed-item{display:flex;gap:12px;padding:16px 0;border-bottom:1px solid var(--border);}
.feed-body{flex:1;}
.feed-action{font-size:12px;color:var(--text-dim);margin-bottom:6px;display:flex;flex-wrap:wrap;gap:4px;}
.feed-action strong{color:var(--text);}
.feed-action .ts{margin-left:auto;font-family:monospace;font-size:10px;color:var(--text-faint);}
.feed-ref{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;display:flex;gap:12px;align-items:center;}
.ref-type{font-size:9px;font-family:monospace;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;}
.ref-title{font-size:12px;font-weight:600;color:var(--text);}
.feed-thumb{width:60px;height:45px;background:var(--surface3);border-radius:2px;flex-shrink:0;}
.filter-bar{display:flex;gap:6px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.fchip{font-size:11px;font-family:monospace;padding:4px 12px;border-radius:2px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;white-space:nowrap;}
.fchip.active{border-color:var(--accent-border);background:var(--accent-bg);color:var(--accent);}
.search-result{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.res-chip{font-size:9px;font-family:monospace;padding:3px 8px;border-radius:2px;border:1px solid var(--border2);color:var(--text-faint);background:var(--surface2);min-width:72px;text-align:center;height:fit-content;margin-top:2px;flex-shrink:0;}
.res-chip.project{border-color:var(--accent-border);color:var(--accent);background:var(--accent-bg);}
.res-chip.guide{border-color:rgba(74,222,128,.2);color:var(--green);background:var(--green-bg);}
.res-chip.explainer{border-color:rgba(251,191,36,.2);color:var(--yellow);background:var(--yellow-bg);}
.res-chip.article{border-color:rgba(248,113,113,.2);color:var(--red);background:var(--red-bg);}
.res-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.res-excerpt{font-size:12px;color:var(--text-dim);line-height:1.55;margin-bottom:6px;}
.video-player{background:#000;border:1px solid var(--border);border-radius:var(--radius);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.video-player::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:32px 32px;opacity:.15;}
.play-btn{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.editor-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.tool-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
.tool-btn{font-size:11px;font-family:monospace;padding:4px 10px;border-radius:var(--radius);border:1px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;}
.tool-btn:hover{background:var(--surface2);border-color:var(--border);color:var(--text);}
.tool-btn.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);}
.edit-block{position:relative;border:1px solid transparent;border-radius:var(--radius);margin-bottom:8px;}
.edit-block:hover{border-color:var(--border2);}
.edit-block.selected{border-color:var(--accent-border);background:rgba(91,156,246,.03);}
.lesson-card{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.lesson-icon{width:36px;height:36px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.lesson-title{font-size:12px;font-weight:600;margin-bottom:2px;}
.lesson-meta{font-size:10px;font-family:monospace;color:var(--text-faint);}
.lesson-status{margin-left:auto;font-size:10px;font-family:monospace;}
.lesson-status.done{color:var(--green);}.lesson-status.cur{color:var(--accent);}
.member-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.member-row:last-child{border-bottom:none;}
.member-role{margin-left:auto;font-size:10px;font-family:monospace;color:var(--text-faint);}
.mag-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:grid;grid-template-columns:1fr 1fr;margin-bottom:24px;}
.mag-img{background:var(--surface2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:220px;color:var(--text-faint);font-size:11px;font-family:monospace;}
.mag-img::after{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:28px 28px;opacity:.3;}
.mag-img span{position:relative;z-index:1;}
.mag-body{padding:28px;display:flex;flex-direction:column;justify-content:center;}
.mag-eyebrow{font-size:10px;font-family:monospace;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.mag-title{font-size:20px;font-weight:700;line-height:1.25;margin-bottom:12px;}
.mag-excerpt{font-size:13px;color:var(--text-dim);line-height:1.65;margin-bottom:20px;}
.stat-chip{display:flex;flex-direction:column;align-items:center;padding:12px 20px;}
.stat-chip .n{font-size:20px;font-weight:700;}
.stat-chip .l{font-size:10px;font-family:monospace;color:var(--text-dim);margin-top:2px;}
.progress-track{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;background:var(--accent);}
.exp-layout{display:flex;height:100%;}
.exp-sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;flex-shrink:0;}
.exp-sidebar-title{font-size:10px;font-family:monospace;color:var(--text-faint);letter-spacing:.1em;text-transform:uppercase;padding:0 16px 12px;}
.exp-nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:12px;color:var(--text-dim);cursor:pointer;border-left:2px solid transparent;}
.exp-nav-item.active{color:var(--text);border-left-color:var(--accent);background:var(--surface2);}
.exp-nav-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.exp-nav-item.active .exp-nav-dot{background:var(--accent);}
.exp-content{flex:1;overflow-y:auto;}
.exp-section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:64px 72px;border-bottom:1px solid var(--border);position:relative;}
.exp-section-tag{font-size:10px;font-family:monospace;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.exp-section-num{position:absolute;top:24px;right:32px;font-size:80px;font-weight:900;color:var(--border);line-height:1;user-select:none;}
.exp-embed{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-top:28px;max-width:540px;}
.exp-embed-label{font-size:10px;font-family:monospace;color:var(--text-faint);margin-bottom:12px;letter-spacing:.08em;}
.exp-embed-inner{background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius);height:80px;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:monospace;color:var(--text-faint);}
.config-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.config-row:last-child{border-bottom:none;}
.config-key{font-size:12px;font-family:monospace;color:var(--accent);min-width:220px;}
.config-desc{font-size:12px;color:var(--text-dim);flex:1;}
.toggle{width:32px;height:18px;border-radius:10px;border:1px solid var(--border2);background:var(--surface3);position:relative;cursor:pointer;flex-shrink:0;}
.toggle::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:var(--text-faint);top:2px;left:2px;transition:transform .15s;}
.toggle.on{background:var(--accent);border-color:var(--accent);}
.toggle.on::after{background:#fff;transform:translateX(14px);}
.pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:32px;padding-top:20px;border-top:1px solid var(--border);}
.diff-dots{display:inline-flex;gap:3px;align-items:center;}
.diff-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);display:inline-block;}
.diff-dot.on{background:var(--accent);}
input[type=text],input[type=search],textarea,select{font-family:inherit;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">@commonpub/<span>ui</span></div>
  <div class="topbar-label">generic view reference &middot; pre-token &middot; base.css defaults</div>
</div>
<div class="shell">
<nav class="sidenav" id="sidenav"></nav>
<div class="viewport" id="viewport"></div>
</div>

<script>
/* ============================================================
   NAV STRUCTURE
============================================================ */
const NAV = [
  { group: 'browse', items: [
    { id:'browse-projects', label:'project browse',   badge:'ContentGrid' },
    { id:'browse-feed',     label:'social feed',      badge:'ActivityFeed' },
    { id:'browse-magazine', label:'magazine home',    badge:'MagazineHome' },
    { id:'browse-search',   label:'search',           badge:'SearchResults' },
  ]},
  { group: 'content views', items: [
    { id:'view-project',   label:'project',         badge:'ProjectView' },
    { id:'view-guide',     label:'guide',           badge:'GuideView' },
    { id:'view-explainer', label:'explainer',       badge:'ExplainerViewer' },
    { id:'view-article',   label:'article',         badge:'ArticleView' },
    { id:'view-post',      label:'blog post',       badge:'PostView' },
    { id:'view-video',     label:'video',           badge:'VideoView' },
    { id:'view-module',    label:'learning module', badge:'ModuleView' },
  ]},
  { group: 'create', items: [
    { id:'editor', label:'block editor', badge:'TiptapEditor' },
  ]},
  { group: 'community', items: [
    { id:'profile', label:'user profile', badge:'ProfileView' },
    { id:'hub',     label:'hub',          badge:'HubView' },
  ]},
  { group: 'instance', items: [
    { id:'config', label:'commonpub.config', badge:'ConfigView' },
  ]},
];

/* ============================================================
   HELPERS
============================================================ */
const appNav = (active) => `
<nav class="app-nav">
  <div class="app-nav-logo">[instance]<small>powered by commonpub</small></div>
  <div style="display:flex;gap:4px;">${['projects','guides','explainers','learn','hubs'].map(l=>`<button class="nav-link${l===active?' active':''}">${l}</button>`).join('')}</div>
  <div class="nav-right">
    <div class="av av-sm">U</div>
  </div>
</nav>`;

const thumb = (label, height='') => `
<div class="thumb thumb-16x9"${height?` style="height:${height}"`:''}><span class="thumb-label">${label}</span></div>`;

const tags = (arr, accents=[0]) => arr.map((t,i)=>`<span class="tag${accents.includes(i)?' tag-accent':''}">${t}</span>`).join('');

const av = (init, cls='') => `<div class="av${cls?' '+cls:''}">${init}</div>`;

const fedBadge = (label) => `<div class="fed-badge"><div class="fed-dot"></div>${label}</div>`;

const diffDots = (n, max=5) => `<div class="diff-dots">${Array(max).fill(0).map((_,i)=>`<div class="diff-dot${i<n?' on':''}"></div>`).join('')}</div>`;

const tag = (t, cls='') => `<span class="tag${cls?' '+cls:''}">${t}</span>`;

const sbCard = (title, body) => `<div class="sb-card"><div class="sb-title">${title}</div>${body}</div>`;

const filterBar = (chips, active=0) => `
<div class="filter-bar">${chips.map((c,i)=>`<span class="fchip${i===active?' active':''}">${c}</span>`).join('')}</div>`;

const faintLabel = (txt) => `<div style="font-size:10px;font-family:monospace;color:var(--text-faint);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;">${txt}</div>`;

    {key:'features.articles',       desc:'Editorial articles &mdash; requires editor role',   on:false},

    {key:'features.learningModules',desc:'Module collections with enrollment tracking',       on:false},
    {key:'features.video',          desc:'Video embed metadata + profile playlists',          on:false},
    {key:'features.hubs',           desc:'AP Group-backed community hubs',                    on:true},
    {key:'features.contests',       desc:'Timed submission contests',                         on:false},
    {key:'features.federation',     desc:'ActivityPub inbox/outbox, WebFinger, NodeInfo',     on:true},

  const fedConf = [

    {key:'federation.handle', val:'yourinstance'},
    {key:'ap:id',             val:'https://your-instance.com/@yourinstance'},

    {key:'nodeinfo',          val:'/.well-known/nodeinfo'},

/* ============================================================
   ROUTER
============================================================ */
const VIEWS = {
  'browse-projects': renderBrowseProjects,
  'browse-feed':     renderBrowseFeed,
  'browse-magazine': renderBrowseMagazine,
  'browse-search':   renderBrowseSearch,
  'view-project':    renderViewProject,
  'view-guide':      renderViewGuide,
  'view-explainer':  renderViewExplainer,
  'view-article':    renderViewArticle,
  'view-post':       renderViewPost,
  'view-video':      renderViewVideo,
  'view-module':     renderViewModule,
  'editor':          renderEditor,
  'profile':         renderProfile,
  'hub':             renderHub,
  'config':          renderConfig,
};

let currentId = 'browse-projects';

function show(id) {
  if (!VIEWS[id]) return;
  currentId = id;

  // update nav active state
  document.querySelectorAll('.sidenav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === id);
  });

  // render into viewport
  const vp = document.getElementById('viewport');
  let div = document.getElementById('vw-' + id);
  if (!div) {
    div = document.createElement('div');
    div.className = 'view';
    div.id = 'vw-' + id;
    vp.appendChild(div);
  }
  div.innerHTML = VIEWS[id]();

  // hide all, show target
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  div.classList.add('active');
  div.scrollTop = 0;
}

/* ============================================================
   BUILD SIDEBAR
============================================================ */
(function buildNav() {
  const nav = document.getElementById('sidenav');
  NAV.forEach(group => {
    const g = document.createElement('div');
    g.className = 'sidenav-group';
    g.innerHTML = `<div class="sidenav-group-label">${group.group}</div>`;
    group.items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'sidenav-item';
      btn.dataset.id = item.id;
      btn.innerHTML = `<div class="dot"></div>${item.label}<span class="badge">${item.badge}</span>`;
      btn.addEventListener('click', () => show(item.id));
      g.appendChild(btn);
    });
    nav.appendChild(g);
  });
})();

// initial render
show('browse-projects');
</script>
